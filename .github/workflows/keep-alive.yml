name: Keep Streamlit App Awake

# Runs on a schedule to visit the Streamlit app before its 12-hour
# inactivity sleep timer runs out. Also runnable manually from the
# Actions tab via "Run workflow" if you ever want to force a ping.
#
# STREAMLIT_APP_URL: if the app URL ever changes, update it below —
# this is the only place it needs to change in this workflow.

on:
  schedule:
    # Every 3 hours — tighter than before, since the app can apparently
    # still slip into sleep between pings for reasons beyond the documented
    # 12-hour window (or a missed/delayed scheduled run). More frequent
    # pings reduce that window of risk.
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Visit the app to reset its sleep timer
        run: |
          curl -sS -o /dev/null -w "HTTP status: %{http_code}\n" \
            "https://overlimits.streamlit.app/" \
            --max-time 60 \
            --max-redirs 5 \
            --retry 3 \
            --retry-delay 10 \
          || echo "Ping failed or app may be asleep — see note below."
        continue-on-error: true
